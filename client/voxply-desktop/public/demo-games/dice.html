<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Voxply Dice</title>
<style>
  /* The game iframe is sandboxed; it can't read the parent's CSS variables
   * directly. We do our own theming based on a `?theme=...` query param the
   * Voxply client appends to the entry_url. Defaults to "calm". */
  :root {
    --bg: #1c1a1f;
    --surface: #2c2a31;
    --text: #ebe6dc;
    --text-muted: #a39c91;
    --accent: #88b8a8;
    --accent-text: #1c1a1f;
    --accent-hover: #74a594;
  }
  :root[data-theme="classic"] {
    --bg: #1a1a2e;
    --surface: #1e2a47;
    --text: #e0e2ed;
    --text-muted: #9ba1b8;
    --accent: #7c3aed;
    --accent-text: #ffffff;
    --accent-hover: #6d28d9;
  }
  :root[data-theme="linear"] {
    --bg: #0c0d11;
    --surface: #1c1d24;
    --text: #f7f7fa;
    --text-muted: #8a8c98;
    --accent: #6571f0;
    --accent-text: #ffffff;
    --accent-hover: #4f5bc4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    overflow: hidden;
    user-select: none;
  }
  h1 { color: var(--accent); font-size: 24px; }
  .greeting { color: var(--text-muted); font-size: 14px; min-height: 20px; }
  .die {
    width: 160px; height: 160px;
    border-radius: 24px;
    background: var(--surface);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 96px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    transition: transform 0.15s;
  }
  .die.rolling { animation: shake 0.4s ease-in-out; }
  @keyframes shake {
    0%, 100% { transform: rotate(0) scale(1); }
    25% { transform: rotate(-10deg) scale(1.05); }
    75% { transform: rotate(10deg) scale(1.05); }
  }
  button {
    padding: 12px 32px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: var(--accent-text);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: var(--accent-hover); }
  .count { color: var(--text-muted); font-size: 12px; }
</style>
</head>
<body>
  <h1>🎲 Voxply Dice</h1>
  <div class="greeting" id="greeting">Loading…</div>
  <div class="die" id="die">—</div>
  <button id="roll">Roll</button>
  <div class="count" id="count">Rolls: 0</div>

<script>
// --- Theme bootstrap ---
// The parent appends ?theme=<calm|classic|linear> to the iframe src so we can
// match the user's chosen theme without reading the parent's CSS.
const themeParam = new URLSearchParams(location.search).get("theme");
if (themeParam === "classic" || themeParam === "linear") {
  document.documentElement.dataset.theme = themeParam;
}

// --- Voxply game SDK v1 ---
// The parent client injects an ack postMessage when ready. We ask for user
// info; it replies with { type: 'voxply:user', data: { ... } }.
const voxply = {
  user: null,
  _resolvers: [],
  getUser() {
    return new Promise((resolve) => {
      if (this.user) return resolve(this.user);
      this._resolvers.push(resolve);
      window.parent.postMessage({ type: "voxply:getUser" }, "*");
    });
  },
};
window.addEventListener("message", (e) => {
  if (e.data?.type === "voxply:user") {
    voxply.user = e.data.data;
    voxply._resolvers.forEach((r) => r(voxply.user));
    voxply._resolvers = [];
  }
});

// --- Game code ---
const dieEl = document.getElementById("die");
const countEl = document.getElementById("count");
const greetingEl = document.getElementById("greeting");
const FACES = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
let rolls = 0;

document.getElementById("roll").addEventListener("click", () => {
  dieEl.classList.add("rolling");
  setTimeout(() => dieEl.classList.remove("rolling"), 400);
  const value = Math.floor(Math.random() * 6);
  dieEl.textContent = FACES[value];
  rolls++;
  countEl.textContent = `Rolls: ${rolls}`;
});

(async () => {
  const user = await voxply.getUser();
  const name = user?.display_name || "player";
  greetingEl.textContent = `Hello, ${name}`;
})();
</script>
</body>
</html>
